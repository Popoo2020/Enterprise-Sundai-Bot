name: SundAI website checks

on:
  pull_request:
    paths:
      - "site/**"
      - "site/wrangler.toml"
      - ".github/workflows/site-ci.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - "site/wrangler.toml"
      - ".github/workflows/site-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Validate pages and assets
        run: node site/tests/check-site.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        run: |
          node --check site/assets/site.js
          node --check site/assets/neon-compact.js
          node --check site/functions/api/contact.js