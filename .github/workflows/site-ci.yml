name: SundAI website checks

on:
  pull_request:
    paths:
      - "site/**"
      - "site/wrangler.toml"
      - ".github/workflows/site-ci.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - "site/wrangler.toml"
      - ".github/workflows/site-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Capture validation result
        shell: bash
        run: |
          set +e
          node site/tests/check-site.mjs > validation.log 2>&1
          echo $? > validation.exit
          set -e
      - name: Upload validation diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: site-validation-diagnostics
          path: |
            validation.log
            validation.exit
      - name: Enforce validation result
        shell: bash
        run: |
          cat validation.log
          test "$(cat validation.exit)" = "0"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check JavaScript syntax
        run: |
          node --check site/assets/site.js
          node --check site/assets/neon-compact.js
          node --check site/functions/api/contact.js