<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 108" role="img" aria-labelledby="title desc">
  <title id="title">SundAI</title>
  <desc id="desc">SundAI network and control logo in neon blue, turquoise, purple and orange.</desc>
  <defs>
    <linearGradient id="frame" x1="10" y1="8" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00e7d7"/><stop offset=".43" stop-color="#1689ff"/><stop offset=".76" stop-color="#5a52ff"/><stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ai" x1="285" y1="25" x2="405" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16c8ff"/><stop offset=".52" stop-color="#5267ff"/><stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g transform="translate(4 4)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 3 91 27v48L50 99 9 75V27Z" stroke="url(#frame)" stroke-width="5"/>
    <circle cx="50" cy="51" r="18" stroke="#1689ff" stroke-width="5"/>
    <path d="M50 33V18M50 84V69M32 51H17M83 51H68" stroke="url(#frame)" stroke-width="5"/>
    <circle cx="50" cy="17" r="4" fill="#00e7d7" stroke="none" filter="url(#glow)"/>
    <circle cx="50" cy="85" r="4" fill="#1689ff" stroke="none" filter="url(#glow)"/>
    <circle cx="16" cy="51" r="4" fill="#3680ff" stroke="none" filter="url(#glow)"/>
    <circle cx="84" cy="51" r="4" fill="#9c5cff" stroke="none" filter="url(#glow)"/>
    <circle cx="50" cy="51" r="6.5" fill="#ff9d19" stroke="#ffd166" stroke-width="1.5" filter="url(#glow)"/>
  </g>
  <text x="121" y="77" fill="#f7fbff" font-family="Inter,Arial,sans-serif" font-size="64" font-weight="700" letter-spacing="-3">Sund</text>
  <text x="285" y="77" fill="url(#ai)" font-family="Inter,Arial,sans-serif" font-size="64" font-weight="800" letter-spacing="-3">AI</text>
